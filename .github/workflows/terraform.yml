name: terraform

on:
    pull_request:
        branches:
            -   main

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: iam.googleapis.com/projects/875930234432/locations/global/workloadIdentityPools/github/providers/github-provider
          service_account: terraform@hexamol.iam.gserviceaccount.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      -  run: terraform init
 
      -  run: terraform validate

      -  run: terraform plan

      -  run: terraform apply -auto-approve